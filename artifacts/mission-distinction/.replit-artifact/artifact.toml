kind = "web"
previewPath = "/"
title = "Mission Distinction"
version = "1.0.0"
id = "artifacts/mission-distinction"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19257

[services.development]
run = "pnpm --filter @workspace/mission-distinction run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mission-distinction", "run", "build" ]
publicDir = "artifacts/mission-distinction/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19257"
BASE_PATH = "/"
