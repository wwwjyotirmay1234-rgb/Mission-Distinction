    <!-- Dark background prevents white/black flash while JS loads -->
    <style>html,body{background:#0d0f1a;margin:0;padding:0;min-height:100vh;}</style>
  </head>
  <body>
    <div id="root"></div>

    <!--
      CRITICAL: This inline script runs BEFORE any React bundle.
      If stale service-worker chunks cause main.tsx to never execute,
      the controllerchange listener in main.tsx is never registered.
      This script is the safety net — it fires regardless of React.
    -->
    <script>
      (function () {
        // 1. When a new SW takes control, reload once to get fresh JS chunks.
        //    This is safe — after the reload the SW is already active, so
        //    controllerchange won't fire again on normal usage.
        if ('serviceWorker' in navigator) {
          var _swReloading = false;
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (!_swReloading) { _swReloading = true; window.location.reload(); }
          });
        }

        // 2. If a JS/CSS chunk 404s (stale cache), do ONE hard reload.
        //    sessionStorage flag prevents an infinite reload loop on slow connections.
        var CHUNK_KEY = '_md_cr';
        if (!sessionStorage.getItem(CHUNK_KEY)) {
          window.addEventListener('error', function (e) {
            var el = e && e.target;
            var src = (el && (el.src || el.href)) || '';
            if (src && src.includes('/assets/') &&
                (src.endsWith('.js') || src.endsWith('.css'))) {
              console.warn('[MD] Chunk failed, reloading once:', src);
              sessionStorage.setItem(CHUNK_KEY, '1');
              window.location.reload(true);
            }
          }, true);
        } else {
          sessionStorage.removeItem(CHUNK_KEY); // reset for next visit
        }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
