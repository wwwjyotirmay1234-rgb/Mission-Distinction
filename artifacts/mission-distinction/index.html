    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DQE6YB15MZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DQE6YB15MZ', { send_page_view: false });
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Dark background prevents white/black flash while JS loads -->
    <style>
      html,body{background:#0d0f1a;margin:0;padding:0;min-height:100vh;}
      #app-loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0f1a;z-index:9990;pointer-events:none;}
      #app-loading-ring{width:40px;height:40px;border:3px solid #3b2170;border-top-color:#7c3aed;border-radius:50%;animation:md-spin 0.7s linear infinite;}
      @keyframes md-spin{to{transform:rotate(360deg)}}
      #app-error{display:none;position:fixed;top:0;left:0;right:0;padding:16px 20px;background:#1a0a2e;border-bottom:2px solid #f87171;color:#fca5a5;font-family:monospace;font-size:13px;z-index:9999;white-space:pre-wrap;word-break:break-all;line-height:1.5;}
    </style>
  </head>
  <body>
    <!-- #app-loading spinner: visible immediately, hidden by JS once React mounts -->
    <div id="app-loading" aria-hidden="true">
      <div id="app-loading-ring"></div>
    </div>
    <!-- #app-error: hidden normally, shown by onerror/onunhandledrejection before React mounts -->
    <div id="app-error"></div>

    <div id="root"></div>

    <!-- Error capture: shows any JS error on-screen BEFORE React mounts so we can debug production -->
    <script>
      (function(){
        function _showErr(msg){
          var el=document.getElementById('app-error');
          if(el){el.style.display='block';el.textContent=(el.textContent?el.textContent+'\n':'')+msg;}
        }
        window.addEventListener('error',function(e){
          if(document.getElementById('root').hasChildNodes())return;
          _showErr('[JS Error] '+(e.message||String(e.error))+'\n  at '+(e.filename||'?')+':'+(e.lineno||'?'));
        });
        window.addEventListener('unhandledrejection',function(e){
          if(document.getElementById('root').hasChildNodes())return;
          _showErr('[Unhandled Promise] '+(e.reason&&(e.reason.message||e.reason.stack||String(e.reason))));
        });
      })();
    </script>

    <!--
      CRITICAL: This inline script runs BEFORE any React bundle.
      BUILD_STAMP changes with every deployment — triggers a full SW nuke + reload
      for any user whose cached stamp is outdated, regardless of sessionStorage state.
    -->
    <script>
      (function () {
        var BUILD_STAMP = 'md-v25-20260629';
        var STAMP_KEY   = '_md_build';
        var CHUNK_KEY   = '_md_cr';

        // ── 1. Build-stamp check: new deployment → nuke old SW + caches + reload ──
        var storedStamp = localStorage.getItem(STAMP_KEY);
        if (storedStamp !== BUILD_STAMP && 'serviceWorker' in navigator) {
          localStorage.setItem(STAMP_KEY, BUILD_STAMP);
          sessionStorage.removeItem(CHUNK_KEY); // clear any stale chunk-error flag
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            var nukes = regs.map(function (r) { return r.unregister(); });
            return Promise.all(nukes);
          }).then(function () {
            return caches.keys();
          }).then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }).then(function () {
            window.location.reload(true);
          }).catch(function () {
            window.location.reload(true);
          });
          return; // halt — reload is coming
        }

        // ── 2. SW signals update via postMessage (iOS-safe) or controllerchange ──
        if ('serviceWorker' in navigator) {
          var _swReloading = false;
          function _doSwReload() {
            if (!_swReloading) { _swReloading = true; window.location.reload(); }
          }
          // postMessage path: new SW broadcasts SW_UPDATED after clients.claim()
          navigator.serviceWorker.addEventListener('message', function (ev) {
            if (ev.data && ev.data.type === 'SW_UPDATED') { _doSwReload(); }
          });
          // controllerchange path: fallback for browsers that support it reliably
          navigator.serviceWorker.addEventListener('controllerchange', _doSwReload);
        }

        // ── 3. Chunk 404 guard: stale cached JS/CSS → reload once per session ────
        if (!sessionStorage.getItem(CHUNK_KEY)) {
          window.addEventListener('error', function (e) {
            var el = e && e.target;
            var src = (el && (el.src || el.href)) || '';
            if (src && src.includes('/assets/') &&
                (src.endsWith('.js') || src.endsWith('.css'))) {
              console.warn('[MD] Chunk failed, reloading once:', src);
              sessionStorage.setItem(CHUNK_KEY, '1');
              window.location.reload(true);
            }
          }, true);
        } else {
          sessionStorage.removeItem(CHUNK_KEY);
        }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
