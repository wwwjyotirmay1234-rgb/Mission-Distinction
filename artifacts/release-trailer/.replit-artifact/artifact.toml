kind = "video"
previewPath = "/release-trailer/"
title = "Mission Distinction — Release Trailer"
version = "1.0.0"
id = "artifacts/release-trailer"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/release-trailer/" ]
localPort = 21147

[services.development]
run = "pnpm --filter @workspace/release-trailer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/release-trailer", "run", "build" ]
publicDir = "artifacts/release-trailer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21147"
BASE_PATH = "/release-trailer/"
